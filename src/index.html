<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

  <body class="night-bg-body">
    <header>
      <div class="search-container">
        <input id="search-input" type="text" />

          <svg viewBox="0 0 24 24" class="search__icon">

              <path

            </g>
          </svg>
        </button>
      </div>
    </header>
    <section class="content night-bg">
      <div class="content_header">
        <div class="title">
          <h1 class="city-name"></h1>
          <p id="country-name"></p>
        </div>
      </div>
      <div class="left-sidebar">
        <svg

          width="80"
          height="80"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-cloud text-white"
          data-fg-d3bl1="0.8:1.7001:/src/app/App.tsx:32:14:756:24:e:Cloud::::::EGNf"

        <div class="info">
          <p class="temperature font-big">24</p>
          <p class="status lighter sub-title">Parcialmente nublado</p>
          <p class="feeling dark-white">Sensação de 26</p>
        </div>
      </div>
      <div class="right-sidebar">
        <div class="main-grid-box night-bg">
          <div class="title">
            <img src="./images/humidity.png" alt="" class="icon" />

        <div class="main-grid-box night-bg">
          <div class="title">
            <img src="./images/air.png" alt="" class="icon" />

        <div class="main-grid-box night-bg">
          <div class="title">
            <img src="./images/visibility.png" alt="" class="icon" />
            <p class="text lighter">Visibilidade</p>
          </div>
          <p class="medida"></p>
        </div>
        <div class="main-grid-box night-bg">
          <div class="title">
            <img src="./images/pressure.png" alt="" class="icon" />
            <p class="text lighter">Pressão</p>
          </div>
          <p class="medida"></p>
        </div>
      </div>
    </section>
    <section class="days night-bg">
